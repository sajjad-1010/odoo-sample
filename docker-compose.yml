services:
  db:
    image: postgres:15
    container_name: odoo_postgres
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - odoo_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  odoo_pgdata:
